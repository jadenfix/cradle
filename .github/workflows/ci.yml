name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
